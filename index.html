<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Solar Nemesis — 3D полёт по Солнечной системе. Работает в браузере на ПК и Android." />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Solar Nemesis — 3D Solar System</title>
  <script>
    // Base path for GitHub Pages (/solar/) and local server (/)
    (function () {
      var parts = location.pathname.replace(/\/+$/, '').split('/');
      if (parts[parts.length - 1] && parts[parts.length - 1].indexOf('.') !== -1) parts.pop();
      var base = parts.join('/') || '';
      if (base && base.charAt(base.length - 1) !== '/') base += '/';
      if (base && base.charAt(0) !== '/') base = '/' + base;
      window.__BASE__ = (!base || base === '/') ? './' : base;
      document.write('<base href="' + window.__BASE__ + '">');
    })();
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-wrap"></div>
  <div id="atmo-veil"></div>
  <div id="warp-veil"></div>

  <div id="porthole" aria-hidden="true">
    <div class="ck-bleed"></div>
    <div class="ck-window-glow"></div>
    <div class="ck-glass"></div>
    <div class="ck-vignette"></div>
    <div class="ck-arch top"></div>
    <div class="ck-arch bot"></div>
    <div class="ck-arch mid"></div>
    <div class="ck-ceiling">
      <div class="ck-ceiling-depth"></div>
      <div class="ck-overhead"><span></span><span></span><span></span></div>
      <span class="ck-beam"></span>
      <span class="ck-beam mid"></span>
      <span class="ck-beam"></span>
      <i class="ck-dot"></i><i class="ck-dot"></i><i class="ck-dot"></i>
      <i class="ck-dot"></i><i class="ck-dot"></i><i class="ck-dot"></i>
    </div>
    <div class="ck-hull left"></div>
    <div class="ck-hull right"></div>
    <div class="ck-tunnel left"></div>
    <div class="ck-tunnel right"></div>
    <div class="ck-corner left"></div>
    <div class="ck-corner right"></div>
    <div class="ck-pillar left">
      <div class="ck-pillar-face"></div>
      <div class="ck-pillar-rib"></div>
      <div class="ck-sidewin"></div>
      <div class="ck-panel">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span class="led r"></span><span class="led g"></span><span class="led b"></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="ck-pillar right">
      <div class="ck-pillar-face"></div>
      <div class="ck-pillar-rib"></div>
      <div class="ck-sidewin"></div>
      <div class="ck-panel">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span class="led g"></span><span class="led b"></span><span class="led r"></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="ck-frame-top"></div>
    <div class="ck-frame-top-lip"></div>
    <div class="ck-frame-bot"></div>
    <div class="ck-sill"></div>
    <div class="ck-sill-lip"></div>
    <div class="ck-window-rail"></div>
    <div class="ck-bulkhead"></div>
    <div class="ck-console-back"></div>
    <div class="ck-console-body"></div>
    <div class="ck-console-edge"></div>
    <div class="ck-dash">
      <div class="ck-screen s1"><canvas width="180" height="120"></canvas></div>
      <div class="ck-screen s2"><canvas width="140" height="110"></canvas></div>
      <div class="ck-screen s3"><canvas width="200" height="130"></canvas></div>
      <div class="ck-screen s4"><canvas width="140" height="110"></canvas></div>
      <div class="ck-screen s5"><canvas width="220" height="140"></canvas></div>
      <div class="ck-screen s6"><canvas width="140" height="110"></canvas></div>
      <div class="ck-screen s7"><canvas width="200" height="130"></canvas></div>
      <div class="ck-screen s8"><canvas width="140" height="110"></canvas></div>
      <div class="ck-screen s9"><canvas width="180" height="120"></canvas></div>
    </div>
    <div class="ck-seat-base"></div>
    <div class="ck-floor"></div>
    <div class="ck-floor-lip"></div>
  </div>

  <button id="hud-toggle" type="button" title="Скрыть / показать HUD (H)" aria-label="Скрыть HUD">▣</button>

  <div id="mobile-pad">
    <div id="look-zone"></div>
    <div class="joy-zone" id="joy-zone">
      <div class="joy-base"><div class="joy-knob" id="joy-knob"></div></div>
    </div>
    <div class="mob-btns">
      <button class="mob-btn" type="button" id="btn-up">↑</button>
      <button class="mob-btn" type="button" id="btn-boost">⚡</button>
      <button class="mob-btn" type="button" id="btn-down">↓</button>
      <button class="mob-btn" type="button" id="btn-slow">🐢</button>
      <button class="mob-btn" type="button" id="btn-look" title="Осмотр кабины">👁</button>
      <button class="mob-btn" type="button" id="btn-brake" title="Тормоз">✕</button>
      <button class="mob-btn wide" type="button" id="btn-launch">ВЗЛЁТ / F</button>
      <button class="mob-btn wide" type="button" id="btn-fs">⛶ Экран</button>
    </div>
  </div>

  <div id="loading">
    <div class="box">
      <h2>ЗАГРУЗКА КОСМОСА</h2>
      <div class="bar"><div class="fill" id="load-fill"></div></div>
    </div>
  </div>

  <div id="hud">
    <div id="mode"></div>

    <div id="planet-info" class="panel">
      <h2 id="info-name">—</h2>
      <p id="info-desc">—</p>
    </div>

    <div id="hint" class="panel">
      <h2>Добро пожаловать</h2>
      <p id="hint-text">Кликните, чтобы начать полёт. Мышь — поворот корабля · Alt+мышь — осмотр кабины · Q/E — крен · WASD — тяга · Пробел/Ctrl — вверх/вниз · X — тормоз.</p>
      <button class="cta" type="button">Начать полёт</button>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
  <script>
    if (/^(localhost|127\.0\.0\.1)$/i.test(location.hostname)) {
      var s = document.createElement('script');
      s.src = 'js/live-reload.js';
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
